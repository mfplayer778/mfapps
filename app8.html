<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主人公職業計算君</title>
<style>
* { box-sizing: border-box; }
body { font-family: system-ui, -apple-system; background:#1e1e2f; color:#fff; margin:0; padding:12px; }
h1 { text-align:center; margin-bottom:12px; font-size:20px; }
.panel { background:#2b2b44; padding:12px; border-radius:8px; margin-bottom:20px; overflow-x:auto; }
.table-title { text-align:center; font-weight:bold; margin-bottom:6px; }
table { border-collapse: collapse; width:100%; font-size:16px; table-layout: fixed; }
td, th { border:1px solid #555; padding:8px; text-align:center; word-wrap: break-word; min-height:44px; vertical-align: middle; cursor:default; }
th { cursor:pointer; background:#3b3b5a; transition: background 0.3s; position: relative; }
th.active { background:#5555aa; } /* 選択列の色 */
th.active::after { content: attr(data-arrow); position: absolute; right:4px; color:#ffff66; font-weight:bold; }
input, select { width:100%; background:#1e1e2f; color:#fff; border:none; padding:6px; text-align:center; font-size:16px; }
button { width:100%; height:50px; border:none; border-radius:8px; background:#ff6666; color:#000; margin-top:12px; font-size:16px; cursor:pointer; }
button:active { opacity:0.7; }
.result { color:#66ccff; font-weight:bold; font-size:16px; }
.indexVal { color:#ffff66; font-weight:bold; }
.totalLv { text-align:center; margin-top:12px; font-size:18px; font-weight:bold; color:#ffffff; }
.refBox { margin-top:12px; padding:12px; background:#3b3b5a; border-radius:8px; font-size:16px; }
@media (max-width:480px) {
  table { font-size:14px; }
  input, select { font-size:14px; padding:5px; }
  td, th { min-height:36px; padding:6px; }
  .totalLv { font-size:18px; }
  .refBox { font-size:14px; }
}
</style>
</head>
<body>

<h1>主人公職業計算君</h1>

<div class="panel">
  <div class="table-title">職業選択</div>
  <table>
    <tr>
      <td>職業①</td>
      <td><select id="job1"><option value="">ー</option></select></td>
      <td>育成レベル</td>
      <td><input type="number" id="lv1" min="0"></td>
    </tr>
    <tr>
      <td>職業②</td>
      <td><select id="job2"><option value="">ー</option></select></td>
      <td>育成レベル</td>
      <td><input type="number" id="lv2" min="0"></td>
    </tr>
    <tr>
      <td>職業③</td>
      <td><select id="job3"><option value="">ー</option></select></td>
      <td>育成レベル</td>
      <td><input type="number" id="lv3" min="0"></td>
    </tr>
  </table>
  <div class="totalLv">合計レベル：<span id="totalLv">0</span></div>
</div>

<div class="panel">
  <div class="table-title">計算結果</div>
  <table>
    <tbody id="resultTable"></tbody>
  </table>
</div>

<div class="panel">
  <div class="table-title">参考計算</div>
  <div class="refBox" id="referenceBox">計算中</div>
</div>

<button onclick="resetAll()">リセット</button>
<div style="height:30px;"></div> <!-- リセット下スペース -->

<div class="panel">
  <div class="table-title">職業データベース（クリックでソート可）</div>
  <table id="dbTableFull">
    <thead>
      <tr>
        <th data-col="0">職業</th>
        <th data-col="1">HP</th>
        <th data-col="2">攻撃</th>
        <th data-col="3">敏捷</th>
        <th data-col="4">魔回</th>
        <th data-col="5">SP</th>
        <th data-col="6">防御</th>
        <th data-col="7">魔攻</th>
        <th data-col="8">魔防</th>
      </tr>
    </thead>
    <tbody id="dbTable"></tbody>
  </table>
</div>

<script>
const stats = ["HP","攻撃","敏捷","魔回","SP","防御","魔攻","魔防"];
const jobData = {
  "戦士":[14,12,8,10,8,12,8,8],
  "盗賊":[10,10,14,10,10,8,10,8],
  "聖職者":[10,8,10,14,10,8,10,10],
  "魔法使い":[8,8,8,10,14,8,12,12],
  "ナイト":[12,14,7,8,8,12,7,9],
  "アサシン":[9,11,15,10,9,8,10,8],
  "プリースト":[9,8,11,14,10,8,11,10],
  "マジシャン":[8,7,8,9,13,8,14,13],
  "魔剣士":[12,12,7,8,10,11,10,10],
  "聖騎士":[11,10,10,10,10,10,9,10],
  "忍者":[9,10,15,9,11,8,10,8],
  "援術師":[9,8,13,14,11,8,9,10],
  "賢者":[8,7,8,12,14,8,12,11],
  "幻術師":[9,9,10,9,13,8,10,12],
  "MFマスター":[10.5,10.5,10.5,10.5,10.5,10.5,10.5,10.5]
};

function initSelect() {
  ["job1","job2","job3"].forEach(id=>{
    const sel = document.getElementById(id);
    for(let job in jobData){
      sel.innerHTML += `<option value="${job}">${job}</option>`;
    }
  });
}

function createTable() {
  const tbody = document.getElementById("resultTable");
  tbody.innerHTML = "";
  for(let i=0;i<4;i++){
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${stats[i]}</td><td class="result" id="r${i}">計算中</td>
                    <td>${stats[i+4]}</td><td class="result" id="r${i+4}">計算中</td>`;
    tbody.appendChild(tr);
  }
}

function createDB(data=null) {
  const tbody = document.getElementById("dbTable");
  tbody.innerHTML = "";
  const jobs = data || jobData;
  for(let job in jobs){
    const arr = jobs[job];
    const tr = document.createElement("tr");
    let html = `<td>${job}</td>`;
    arr.forEach(v=>html+=`<td>${v}</td>`);
    tr.innerHTML = html;
    tbody.appendChild(tr);
  }
}

function calc() {
  const job1Val = document.getElementById("job1").value;
  const job2Val = document.getElementById("job2").value;
  const job3Val = document.getElementById("job3").value;

  const j1 = jobData[job1Val] || Array(8).fill(0);
  const j2 = jobData[job2Val] || Array(8).fill(0);
  const j3 = jobData[job3Val] || Array(8).fill(0);

  const lv1 = Number(document.getElementById("lv1").value)||0;
  const lv2 = Number(document.getElementById("lv2").value)||0;
  const lv3 = Number(document.getElementById("lv3").value)||0;

  const totalLv = lv1 + lv2 + lv3;
  document.getElementById("totalLv").textContent = totalLv;

  const result = [];
  for(let i=0;i<8;i++){
    const val = j1[i]*(lv1+9) + j2[i]*lv2 + j3[i]*lv3;
    const idx = totalLv + 9 > 0 ? val / (totalLv + 9) : 0;
    const cell = document.getElementById("r"+i);
    cell.innerHTML = totalLv>0 ? `${Math.round(val)} <span class="indexVal">(${idx.toFixed(2)})</span>` : '計算中';
    result.push(idx);
  }

  // 参考計算は合計レベルが0なら「計算中」
  const refBox = document.getElementById("referenceBox");
  if(totalLv===0){
    refBox.textContent = "計算中";
  } else {
    const magic = result[3];
    const defIdx = result[5];
    const mdefIdx = result[7];
    let refText = "";
    refText += `ヒール: ${Math.round(magic*0.4*(totalLv+9))}, `;
    refText += `ヒールオール: ${Math.round(magic*0.2*(totalLv+9))}, `;
    refText += `スーパーヒール: ${Math.round(magic*0.7*(totalLv+9))}<br>`;
    refText += `ディフェンスブラスト: ${Math.round((defIdx-9)*(totalLv+9)*1.5)}, `;
    refText += `ウォールブラスト: ${Math.round((mdefIdx-9)*(totalLv+9)*1.5)}`;
    refBox.innerHTML = refText;
  }
}

function resetAll(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  document.querySelectorAll("select").forEach(s=>s.value="");
  calc();
}

// 初回クリック降順＋矢印表示＋選択列色
const sortOrder = Array(9).fill(false);
document.querySelectorAll("#dbTableFull th").forEach(th=>{
  th.addEventListener("click", ()=>{
    const col = parseInt(th.dataset.col);
    const rows = Array.from(document.querySelectorAll("#dbTable tr"));
    rows.sort((a,b)=>{
      const aVal = a.children[col].textContent;
      const bVal = b.children[col].textContent;
      if(col===0) return sortOrder[col] ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
      return sortOrder[col] ? Number(aVal)-Number(bVal) : Number(bVal)-Number(aVal);
    });
    const tbody = document.getElementById("dbTable");
    tbody.innerHTML="";
    rows.forEach(r=>tbody.appendChild(r));

    // 矢印と色表示
    document.querySelectorAll("#dbTableFull th").forEach(t=>{
      t.classList.remove("active");
      t.removeAttribute("data-arrow");
    });
    th.classList.add("active");
    th.setAttribute("data-arrow", sortOrder[col] ? "↑" : "↓");

    sortOrder[col] = !sortOrder[col];
  });
});

document.addEventListener("input", calc);
initSelect();
createTable();
createDB();
calc();
</script>
</body>
</html>
