<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タリスマン計算君</title>
<style>
* { box-sizing: border-box; }
body { font-family: system-ui, -apple-system; background: #1e1e2f; color: #fff; margin: 0; padding: 12px; }
h1 { text-align: center; margin-bottom: 4px; font-size: 20px; }
.notice { text-align: center; font-size: 14px; margin-bottom: 12px; color: #ccc; }
.panel { background: #2b2b44; padding: 12px; border-radius: 8px; margin-bottom: 12px; width: 100%; overflow-x: auto; }
table { border-collapse: collapse; width: 100%; font-size: 16px; table-layout: fixed; margin-bottom: 12px; }
td { border: 1px solid #555; padding: 8px; text-align: center; vertical-align: middle; min-height: 44px; }
td.col-name { width: 120px; text-align:center; }
td.col-value, td.col-limit, td.col-rate { width: 100px; }
.inputWithUnit { display: flex; justify-content: center; align-items: center; }
input.calcInput, input.statInputList { width: 60%; background: #1e1e2f; color: #fff; border: 1px solid #888; border-radius: 4px; padding: 6px; text-align: center; font-size: 16px; }
span.unit { margin-left: 4px; white-space: nowrap; display: none; }
input.titleInput { width: 12em; text-align: center; background: #1e1e2f; color: #fff; border: none; font-weight: bold; font-size:16px; }
textarea.commentBox { width: 100%; height: 80px; border-radius: 8px; background: #1e1e2f; color: #fff; border: 1px solid #555; padding: 8px; resize: vertical; }
button { font-size: 16px; border-radius: 8px; border: none; cursor: pointer; }
button.resetBtn, #screenshotBtn, #csvBtn { height:48px; flex:1; }
button.resetBtn { background:#ff6666; color:#000; width:100%; margin-bottom:8px; }
.buttonRow { display:flex; width:100%; gap:8px; margin-bottom:12px; }
#screenshotBtn { background: #66ccff; color:#000; }
#csvBtn { background: #66ff66; color:#000; }

@media (max-width:480px){
  .buttonRow { flex-direction: row; gap: 8px; }
  button.resetBtn, #screenshotBtn, #csvBtn { height:48px; font-size:16px; }
  table { font-size: 14px; }
  input.calcInput, input.titleInput, input.statInputList { padding: 5px; font-size: 14px; max-width: 90px; }
  td { min-height: 36px; }
}
</style>
</head>
<body>

<h1>タリスマン計算君</h1>
<div class="notice">※項目は手入力またはプルダウンから選択してください</div>

<div class="panel" id="capturePanel">
  <table>
    <thead>
      <tr>
        <td colspan="4" style="font-weight:bold; font-size:16px; text-align:center;">
          タリスマン（<input type="text" class="titleInput" id="talisName" maxlength="11" placeholder="名前入力">）
        </td>
      </tr>
      <tr>
        <td>項目</td>
        <td>上昇値</td>
        <td>上限値</td>
        <td>上昇率</td>
      </tr>
    </thead>
    <tbody id="talisTable"></tbody>
  </table>

  <div style="margin-top:12px;">
    <div style="font-weight:bold; margin-bottom:4px;">コメント</div>
    <textarea class="commentBox" id="commentBox" placeholder="コメントを入力できます…"></textarea>
  </div>
</div>

<button class="resetBtn" id="resetBtn">リセット</button>

<div class="buttonRow">
  <button id="screenshotBtn">スクショ保存</button>
  <button id="csvBtn">CSV出力</button>
</div>

<datalist id="statOptions">
  <option value="HP"></option>
  <option value="攻撃"></option>
  <option value="敏捷"></option>
  <option value="魔回"></option>
  <option value="SP"></option>
  <option value="防御"></option>
  <option value="魔攻"></option>
  <option value="魔防"></option>
  <option value="LP"></option>
  <option value="回復量"></option>
  <option value="火耐性"></option>
  <option value="氷耐性"></option>
  <option value="光耐性"></option>
  <option value="闇耐性"></option>
  <option value="技"></option>
</datalist>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const percentStats=["HP","攻撃","敏捷","魔回","SP","防御","魔攻","魔防"];
const pointStats=["LP","回復量","火耐性","氷耐性","光耐性","闇耐性"];

function createTalisTable(){
  const tbody=document.getElementById("talisTable"); tbody.innerHTML="";
  for(let idx=0; idx<8; idx++){
    const tr=document.createElement("tr");

    const tdName=document.createElement("td"); tdName.className="col-name";
    const inputStat=document.createElement("input"); inputStat.setAttribute("list","statOptions"); inputStat.className="statInputList";
    inputStat.dataset.index=idx; inputStat.addEventListener("input",updateRates); tdName.appendChild(inputStat); tr.appendChild(tdName);

    const tdValue=document.createElement("td"); tdValue.className="col-value";
    const divValue=document.createElement("div"); divValue.className="inputWithUnit";
    const inputValue=document.createElement("input"); inputValue.type="number"; inputValue.min="-9999"; inputValue.step="0.1";
    inputValue.className="calcInput"; inputValue.dataset.index=idx; inputValue.dataset.type="value";
    inputValue.addEventListener("input",updateRates);
    const spanValueUnit=document.createElement("span"); spanValueUnit.className="unit"; spanValueUnit.style.display="none";
    divValue.appendChild(inputValue); divValue.appendChild(spanValueUnit); tdValue.appendChild(divValue); tr.appendChild(tdValue);

    const tdLimit=document.createElement("td"); tdLimit.className="col-limit";
    const divLimit=document.createElement("div"); divLimit.className="inputWithUnit";
    const inputLimit=document.createElement("input"); inputLimit.type="number"; inputLimit.min=0;
    inputLimit.className="calcInput"; inputLimit.dataset.index=idx; inputLimit.dataset.type="limit";
    inputLimit.addEventListener("input",updateRates);
    const spanLimitUnit=document.createElement("span"); spanLimitUnit.className="unit"; spanLimitUnit.style.display="none";
    divLimit.appendChild(inputLimit); divLimit.appendChild(spanLimitUnit); tdLimit.appendChild(divLimit); tr.appendChild(tdLimit);

    const tdRate=document.createElement("td"); tdRate.className="result col-rate"; tdRate.dataset.index=idx; tdRate.textContent="0.0"; tr.appendChild(tdRate);

    tbody.appendChild(tr);
  }
}

function updateRates(){
  for(let idx=0; idx<8; idx++){
    const inputStat=document.querySelectorAll(".statInputList")[idx];
    const stat=inputStat.value.trim();
    const valueInput=document.querySelector(`input.calcInput[data-index="${idx}"][data-type="value"]`);
    const limitInput=document.querySelector(`input.calcInput[data-index="${idx}"][data-type="limit"]`);
    const rateTd=document.querySelector(`.result[data-index="${idx}"]`);
    const valueUnit=valueInput.nextElementSibling; const limitUnit=limitInput.nextElementSibling;

    if(!stat){ rateTd.textContent="0.0"; valueUnit.style.display="none"; limitUnit.style.display="none"; valueInput.disabled=false; continue; }
    valueUnit.style.display=stat==="技"?"none":"inline"; limitUnit.style.display="inline";

    if(stat==="技"){ rateTd.textContent=(Number(limitInput.value)||0).toFixed(0)+"個"; valueInput.value=""; valueInput.disabled=true; limitUnit.textContent="個"; }
    else if(percentStats.includes(stat)){ valueUnit.textContent="%"; limitUnit.textContent="個"; rateTd.textContent=((Number(valueInput.value)||0)*(Number(limitInput.value)||0)).toFixed(1)+"%"; valueInput.disabled=false; }
    else if(pointStats.includes(stat)){ valueUnit.textContent="p"; limitUnit.textContent="個"; rateTd.textContent=((Number(valueInput.value)||0)*(Number(limitInput.value)||0)).toFixed(1)+"p"; valueInput.disabled=false; }
    else{ valueUnit.textContent="-"; limitUnit.textContent="個"; rateTd.textContent=(Number(limitInput.value)||0).toFixed(0)+"個"; valueInput.disabled=false; }
  }
}

function resetAll(){
  document.querySelectorAll(".calcInput").forEach(i=>{ i.value=""; i.disabled=false; i.nextElementSibling.style.display="none"; });
  document.querySelectorAll(".statInputList").forEach(i=>i.value="");
  document.querySelectorAll(".result").forEach(td=>td.textContent="0.0");
  document.getElementById("talisName").value="";
  document.getElementById("commentBox").value="";
}

document.getElementById("screenshotBtn").addEventListener("click", ()=>{
  html2canvas(document.getElementById("capturePanel"),{scale:2}).then(canvas=>{
    const link=document.createElement("a"); link.download="talis_calc.png"; link.href=canvas.toDataURL("image/png"); link.click();
  });
});

document.getElementById("csvBtn").addEventListener("click", ()=>{
  const name=document.getElementById("talisName").value.trim();
  const comment=document.getElementById("commentBox").value.trim();
  let row = name ? name+":" : "";
  for(let idx=0; idx<8; idx++){
    const stat=document.querySelectorAll(".statInputList")[idx].value.trim();
    if(!stat) continue;
    const valInput=document.querySelector(`input.calcInput[data-index="${idx}"][data-type="value"]`);
    const limitInput=document.querySelector(`input.calcInput[data-index="${idx}"][data-type="limit"]`);
    const val = Number(valInput.value)||0;
    const limit = Number(limitInput.value)||0;
    let display="";
    if(percentStats.includes(stat)){ display=`${val.toFixed(1)}-${limit.toFixed(0)}(${(val*limit).toFixed(1)}%)`; }
    else if(pointStats.includes(stat)){ display=`${val.toFixed(1)}-${limit.toFixed(0)}(${(val*limit).toFixed(1)}p)`; }
    else if(stat==="技" || (!percentStats.includes(stat) && !pointStats.includes(stat))){ display=`-${limit.toFixed(0)}(${limit.toFixed(0)}個)`; }
    row += ` ${stat}${display}`;
  }
  if(comment) row += ` [${comment}]`;
  const blob=new Blob([row], {type:"text/csv"});
  const link=document.createElement("a"); link.href=URL.createObjectURL(blob); link.download="talis_calc.csv"; link.click();
});

createTalisTable();
updateRates();
document.getElementById("resetBtn").addEventListener("click", resetAll);
</script>
</body>
</html>
