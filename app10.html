<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タリスマン計算君</title>
<style>
* { box-sizing: border-box; }
body { font-family: system-ui, -apple-system; background: #1e1e2f; color: #fff; margin: 0; padding: 12px; }
h1 { text-align: center; margin-bottom: 4px; font-size: 20px; }
.notice { text-align: center; font-size: 14px; margin-bottom: 12px; color: #ccc; }
.panel { background: #2b2b44; padding: 12px; border-radius: 8px; margin-bottom: 12px; width: 100%; overflow-x: auto; }
table { border-collapse: collapse; width: 100%; font-size: 16px; table-layout: fixed; margin-bottom: 12px; }
td { border: 1px solid #555; padding: 8px; text-align: center; vertical-align: middle; min-height: 44px; }
td.col-name { width: 120px; }
td.col-value, td.col-limit, td.col-rate { width: 100px; }

.inputWithUnit { display: flex; justify-content: center; align-items: center; }
input.calcInput, input.statInputList {
  width: 60%;
  background: #1e1e2f;
  color: #fff;
  border: 1px solid #888;
  border-radius: 4px;
  padding: 6px;
  text-align: center;
}
span.unit { margin-left: 4px; white-space: nowrap; display: none; }

input.titleInput {
  width: 12em;
  text-align: center;
  background: #1e1e2f;
  color: #fff;
  border: none;
  font-weight: bold;
}

textarea.commentBox {
  width: 100%;
  height: 80px;
  border-radius: 8px;
  background: #1e1e2f;
  color: #fff;
  border: 1px solid #555;
  padding: 8px;
}

.resultDisplay {
  font-size:14px;
  white-space: pre-wrap;
  margin-top:8px;
}

button { font-size: 16px; border-radius: 8px; border: none; cursor: pointer; }
button.resetBtn, #copyBtn, #csvBtn { height:48px; flex:1; }
button.resetBtn { background:#ff6666; color:#000; width:100%; margin-bottom:8px; }
.buttonRow { display:flex; width:100%; gap:8px; margin-bottom:12px; }
#copyBtn { background: #66ccff; color:#000; }
#csvBtn { background: #66ff66; color:#000; }
</style>
</head>
<body>

<h1>タリスマン計算君</h1>
<div class="notice">※項目は手入力またはプルダウンから選択してください</div>

<div class="panel">
<table>
<thead>
<tr>
<td colspan="4">
タリスマン（<input type="text" class="titleInput" id="talisName">）
</td>
</tr>
<tr>
<td>項目</td><td>上昇値</td><td>上限値</td><td>上昇率</td>
</tr>
</thead>
<tbody id="talisTable"></tbody>
</table>

<div style="margin-top:12px;">
<div style="font-weight:bold;">メモ欄</div>
<textarea class="commentBox" id="commentBox" placeholder="メモを入力できます"></textarea>
</div>

<div style="margin-top:12px;">
<div style="font-weight:bold;">計算結果</div>
<div id="resultText" class="resultDisplay"></div>
</div>

</div>

<button class="resetBtn" id="resetBtn">リセット</button>

<div class="buttonRow">
<button id="copyBtn">結果をコピー</button>
<button id="csvBtn">CSV出力</button>
</div>

<datalist id="statOptions">
<option value="HP"><option value="攻撃"><option value="敏捷"><option value="魔回">
<option value="SP"><option value="防御"><option value="魔攻"><option value="魔防">
<option value="LP"><option value="回復量"><option value="火耐性"><option value="氷耐性">
<option value="光耐性"><option value="闇耐性"><option value="技">
</datalist>

<script>
const percentStats=["HP","攻撃","敏捷","魔回","SP","防御","魔攻","魔防"];
const pointStats=["LP","回復量","火耐性","氷耐性","光耐性","闇耐性"];

function createTalisTable(){
  const tbody=document.getElementById("talisTable");
  tbody.innerHTML="";

  for(let i=0;i<8;i++){
    const tr=document.createElement("tr");

    tr.innerHTML=`
<td><input list="statOptions" class="statInputList" data-index="${i}"></td>

<td>
<div class="inputWithUnit">
<input type="number" step="0.1" class="calcInput" data-index="${i}" data-type="value">
<span class="unit"></span>
</div>
</td>

<td>
<div class="inputWithUnit">
<input type="number" class="calcInput" data-index="${i}" data-type="limit">
<span class="unit"></span>
</div>
</td>

<td class="result" data-index="${i}">0.0</td>
`;

    tbody.appendChild(tr);
  }

  document.querySelectorAll("input, textarea").forEach(el=>{
    el.addEventListener("input",updateAll);
  });
}

// 以下変更なし
function updateRates(){
  for(let i=0;i<8;i++){
    const stat=document.querySelectorAll(".statInputList")[i].value.trim();
    const valueInput=document.querySelector(`input[data-index="${i}"][data-type="value"]`);
    const limitInput=document.querySelector(`input[data-index="${i}"][data-type="limit"]`);
    const rateTd=document.querySelector(`.result[data-index="${i}"]`);

    const valueUnit=valueInput.nextElementSibling;
    const limitUnit=limitInput.nextElementSibling;

    if(!stat){
      rateTd.textContent="0.0";
      valueUnit.style.display="none";
      limitUnit.style.display="none";
      valueInput.disabled=false;
      continue;
    }

    valueUnit.style.display=stat==="技"?"none":"inline";
    limitUnit.style.display="inline";

    if(stat==="技"){
      rateTd.textContent=(Number(limitInput.value)||0)+"個";
      valueInput.value="";
      valueInput.disabled=true;
      limitUnit.textContent="個";
    }
    else if(percentStats.includes(stat)){
      valueUnit.textContent="%";
      limitUnit.textContent="個";
      rateTd.textContent=((Number(valueInput.value)||0)*(Number(limitInput.value)||0)).toFixed(1)+"%";
      valueInput.disabled=false;
    }
    else if(pointStats.includes(stat)){
      valueUnit.textContent="p";
      limitUnit.textContent="個";
      rateTd.textContent=((Number(valueInput.value)||0)*(Number(limitInput.value)||0)).toFixed(1)+"p";
      valueInput.disabled=false;
    }
    else{
      valueUnit.textContent="-";
      limitUnit.textContent="個";
      rateTd.textContent=(Number(limitInput.value)||0)+"個";
      valueInput.disabled=false;
    }
  }
}

function buildRowText(){
  const name=document.getElementById("talisName").value.trim();
  const comment=document.getElementById("commentBox").value.trim();
  let row=name?name+":":"";

  for(let i=0;i<8;i++){
    const stat=document.querySelectorAll(".statInputList")[i].value.trim();
    if(!stat) continue;

    const v=Number(document.querySelector(`[data-index="${i}"][data-type="value"]`).value)||0;
    const l=Number(document.querySelector(`[data-index="${i}"][data-type="limit"]`).value)||0;

    let txt="";
    if(percentStats.includes(stat)) txt=`${v.toFixed(1)}-${l}(${(v*l).toFixed(1)}%)`;
    else if(pointStats.includes(stat)) txt=`${v.toFixed(1)}-${l}(${(v*l).toFixed(1)}p)`;
    else txt=`-${l}(${l}個)`;

    row+=` ${stat}${txt}`;
  }

  if(comment) row+=` [${comment}]`;
  return row;
}

function updateResultText(){
  document.getElementById("resultText").textContent = buildRowText();
}

function updateAll(){
  updateRates();
  updateResultText();
}

document.getElementById("copyBtn").onclick=async()=>{
  await navigator.clipboard.writeText(buildRowText());
  alert("コピーしました");
};

document.getElementById("csvBtn").onclick=()=>{
  const blob=new Blob([buildRowText()],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="result.csv";
  a.click();
};

document.getElementById("resetBtn").onclick=()=>{
  location.reload();
};

createTalisTable();
updateAll();
</script>
</body>
</html>
